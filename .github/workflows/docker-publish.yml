name: Build and Publish Docker Image

# 构建多阶段 Docker 镜像并推送到 GitHub Container Registry (GHCR)
# 触发条件:推送到 main/master 分支、打 v* 标签、手动触发

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 镜像名使用 GitHub 仓库名(小写),最终镜像地址:ghcr.io/shine-apps/frenquency_circle
  IMAGE_NAME: ${{ github.repository }}
  # 强制 JavaScript Actions 使用 Node 24(GHA v2.328.0+ 仍默认 Node 20)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # 用于跨仓库 OIDC 或加签,本流程未使用但保留兼容
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 利用 GitHub Actions 内置缓存后端
          cache-binary: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # 生成标签策略:
          #   - 推送 main/master 分支 -> latest + 分支名
          #   - 打 v1.2.3 标签       -> 1.2.3 / 1.2 / 1 / v1.2.3
          #   - 手动触发              -> sha-<git短哈希>
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 使用 GHA 缓存加速多阶段构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 通过 provenance 生成 SBOM,提升供应链安全
          provenance: true
          sbom: true
