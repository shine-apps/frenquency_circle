<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="format-detection" content="telephone=no,address=no" />
    <meta name="apple-mobile-web-app-status-bar-style" content="white" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>taro_template</title>
    <script>
      // 固定 html fontSize，防止 flexible 脚本动态修改
      (function() {
        var html = document.documentElement;
        html.style.fontSize = '18px';
        Object.defineProperty(html.style, 'fontSize', {
          get: function() { return '18px'; },
          set: function() { /* 忽略所有修改 */ }
        });
      })();
      <%= htmlWebpackPlugin.options.script %>
    </script>
    <!--
      高德地图 key 注入:运行时由 admin 通过 GET /api/config/amap.js 提供。
      同步加载(无 async/defer),确保在 Taro bundle 执行前设置好
      window.__AMAP_KEY__ / window.__AMAP_SECURITY_CODE__,供 utils/amap.ts 读取。
      本地开发:webpack-dev-server proxy /api → admin:3000,自动同源。
      生产:H5 与 admin 同源(部署在 /h5/),浏览器直接命中 admin 路由。
    -->
    <script src="/api/config/amap.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
