# nginx.conf - 反向代理参考配置(不进 Docker 镜像)
# ==============================================================================
# 用法:在生产环境部署时,把此文件放到 nginx 容器或宿主机,
#      用 `nginx -c /path/to/this/file` 或作为 include 引入。
# 作用:SSL 终止 + gzip + 静态资产缓存,App 容器只需暴露 3000 给内网。
# 假设:app 服务通过 docker compose / k8s service 暴露,地址 "app:3000"。
# ==============================================================================

upstream frenqency_app {
    server app:3000;
    keepalive 16;
}

# HTTP -> HTTPS 重定向(生产环境启用证书后,取消下方注释)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # 上传大小上限:对齐 UPLOAD_MAX_BYTES=104857600 (100 MiB)
    client_max_body_size 100m;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 通用代理参数
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_read_timeout 60s;

    # 根路径:由 Next.js 服务,/ 命中 admin/next.config.ts 的 rewrite 重写到 H5 index.html
    location / {
        proxy_pass http://frenqency_app;
    }

    # 后台
    location /admin/ {
        proxy_pass http://frenqency_app;
    }

    # 登录页
    location = /login {
        proxy_pass http://frenqency_app;
    }

    # API
    location /api/ {
        proxy_pass http://frenqency_app;
    }

    # Next.js 静态资产(带 hash,长缓存)
    location /_next/static/ {
        proxy_pass http://frenqency_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
    }

    # 本地上传(用户头像等)
    location /uploads/ {
        proxy_pass http://frenqency_app;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }
}
